<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Join Fuadsoft Infrastructure</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-container">

  <div class="auth-card" style="max-width: 500px;">
    <div class="badge">New Node Registration</div>
    <h2 style="font-family: 'Outfit'; font-size: 2.5rem; margin-bottom: 10px;">Join the Network</h2>
    <p style="color: var(--text-dim); margin-bottom: 2rem;">Initialize your profile within the Fuadsoft ecosystem.</p>

    <form action="billing.html">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div style="text-align: left;">
          <label style="font-size: 0.7rem; color: var(--accent);">FIRST NAME</label>
          <input type="text" placeholder="Godhi" required>
        </div>
        <div style="text-align: left;">
          <label style="font-size: 0.7rem; color: var(--accent);">DESIGNATION</label>
          <input type="text" placeholder="Lead Architect" required>
        </div>
      </div>

      <div style="text-align: left; margin-top: 10px;">
        <label style="font-size: 0.7rem; color: var(--accent);">SECURE EMAIL</label>
        <input type="email" placeholder="architect@fuadsoft.com" required>
      </div>

      <div style="text-align: left; margin-top: 10px;">
        <label style="font-size: 0.7rem; color: var(--accent);">CREATE PASSCODE</label>
        <input type="password" placeholder="Complex sequence" required>
      </div>

      <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Initialize Deployment</button>
    </form>

    <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-dim);">
      Already a member? <a href="login.html" style="color: var(--accent); text-decoration: none;">Authenticate</a>
    </p>
  </div>

</body>
</html>
