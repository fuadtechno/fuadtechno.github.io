<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Fuadsoft Security Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-container">
  
  <div class="auth-card">
    <div class="badge">Security Layer FS-8802</div>
    <h2 style="font-family: 'Outfit'; font-size: 2.5rem; margin-bottom: 10px;">Authenticate</h2>
    <p style="color: var(--text-dim); margin-bottom: 2rem;">Please provide your architect credentials.</p>

    <form action="dashboard.html">
      <div style="text-align: left; margin-bottom: 15px;">
        <label style="font-size: 0.8rem; color: var(--accent); letter-spacing: 1px;">CREDENTIAL ID</label>
        <input type="email" placeholder="email@fuadsoft.com" required>
      </div>

      <div style="text-align: left; margin-bottom: 25px;">
        <label style="font-size: 0.8rem; color: var(--accent); letter-spacing: 1px;">ENCRYPTION KEY</label>
        <input type="password" placeholder="••••••••••••" required>
      </div>

      <button type="submit" class="btn-primary" style="width: 100%;">Access Console</button>
    </form>

    <div style="margin-top: 2rem; border-top: 1px solid var(--border-glass); padding-top: 1.5rem;">
      <p style="color: var(--text-dim); font-size: 0.85rem;">
        New Architect? <a href="signup.html" style="color: var(--accent); text-decoration: none; font-weight: 700;">Request Access</a>
      </p>
    </div>
  </div>

</body>
</html>
