<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W3 Auth | Fuadsoft Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617;
      --accent: #38bdf8;
      --card-bg: rgba(15, 23, 42, 0.8);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f1f5f9;
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      width: 400px;
      padding: 3rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      text-align: center;
    }

    .w3-logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
      margin-bottom: 2rem;
      display: block;
    }

    h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

    .input-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }

    label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      font-family: inherit;
      outline: none;
      transition: 0.3s;
    }

    input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #020617;
      font-weight: 800;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 1rem;
    }

    .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4); }

    .footer-links { margin-top: 2rem; font-size: 0.85rem; color: #64748b; }
    .footer-links a { color: var(--accent); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <div class="login-box">
    <span class="w3-logo">// FUADSOFT.W3</span>
    <h2>Authenticate</h2>
    <p>Accessing Secure Node FS-8802</p>

    <form action="dashboard.html">
      <div class="input-group">
        <label>Architect ID</label>
        <input type="email" placeholder="name@fuadsoft.com" required>
      </div>

      <div class="input-group">
        <label>Security Token</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login">Initialize Access</button>
    </form>

    <div class="footer-links">
      Not registered? <a href="signup.html">Request Node Access</a>
    </div>
  </div>

</body>
</html>
