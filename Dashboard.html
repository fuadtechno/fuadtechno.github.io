<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuadsoft Dashboard</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      height: 100vh;
      background: #020617;
      padding: 20px;
      position: fixed;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .nav a {
      display: block;
      padding: 10px;
      margin: 5px 0;
      color: #94a3b8;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }

    .nav a:hover {
      background: #1e293b;
      color: #38bdf8;
    }

    /* Main */
    .main {
      margin-left: 250px;
      width: 100%;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e293b;
      padding: 5px 10px;
      border-radius: 999px;
    }

    .profile img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    /* Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 18px;
      border-bottom: 1px solid #334155;
      padding-bottom: 5px;
    }

    .card ul {
      list-style: none;
      padding: 0;
    }

    .card li a {
      color: #cbd5f5;
      text-decoration: none;
      display: block;
      padding: 6px 0;
    }

    .card li a:hover {
      color: #38bdf8;
    }

    /* Responsive */
    @media(max-width:768px){
      .sidebar{
        position: relative;
        width: 100%;
        height: auto;
      }

      .main{
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">Fuadsoft</div>
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="about.html">About</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">

    <div class="topbar">
      <h2>Dashboard</h2>
      <div class="profile">
        <img src="https://via.placeholder.com/40">
        <span id="username">Fuad</span>
      </div>
    </div>

    <div class="grid">

      <div class="card">
        <h3>Platform</h3>
        <ul>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="#">Analytics</a></li>
          <li><a href="#">Projects</a></li>
          <li><a href="#">Teams</a></li>
        </ul>
      </div>

      <div class="card">
        <h3>Developers</h3>
        <ul>
          <li><a href="#">API Docs</a></li>
          <li><a href="#">SDKs</a></li>
          <li><a href="#">CLI</a></li>
          <li><a href="#">Status</a></li>
        </ul>
      </div>

      <div class="card">
        <h3>Company</h3>
        <ul>
          <li><a href="#">About</a></li>
          <li><a href="#">Careers</a></li>
          <li><a href="#">Press</a></li>
        </ul>
      </div>

    </div>

  </div>

  <script>
    const name = localStorage.getItem("username") || prompt("Enter your name:");
    if (name) {
      localStorage.setItem("username", name);
      document.getElementById("username").textContent = name;
    }
  </script>

</body>
</html>
