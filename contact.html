<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Fuadsoft Support</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.15);
      --bg-deep: #020617;
      --sidebar-bg: #0f172a;
      --card-glass: rgba(15, 23, 42, 0.7);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-dim: #94a3b8;
      --input-bg: rgba(1, 4, 9, 0.6);
    }

    /* --- RESET & GLOBAL --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      background-image: 
        radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.08), transparent 40%),
        radial-gradient(circle at 0% 0%, rgba(129, 140, 248, 0.05), transparent 40%);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
      overflow: hidden; /* Main content scrollable inside */
    }

    /* --- SIDEBAR BASE --- */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-glass);
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      z-index: 1000;
      backdrop-filter: blur(15px);
    }

    /* --- ACTIVE LINK STYLING --- */
    .nav-link {
      display: flex;
      align-items: center;
      padding: 0.8rem 1.2rem;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.9rem;
      border-radius: 12px;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 5px;
      border-left: 4px solid transparent;
    }

    .nav-link.active {
      background: var(--accent-glow) !important;
      border-left: 4px solid var(--accent) !important;
      color: var(--accent) !important;
      font-weight: 600;
      box-shadow: inset 10px 0 20px rgba(56, 189, 248, 0.05);
    }

    .nav-link:hover:not(.active) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      transform: translateX(5px);
    }

    /* --- CONTACT CONTENT --- */
    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow-y: auto;
    }

    .contact-wrapper {
      max-width: 1100px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 4rem;
      background: var(--card-glass);
      border: 1px solid var(--border-glass);
      padding: 4.5rem;
      border-radius: 48px;
      backdrop-filter: blur(25px);
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .info-side { display: flex; flex-direction: column; justify-content: center; }
    
    h1 { 
      font-family: 'Outfit', sans-serif; 
      font-size: 3.5rem; 
      margin-bottom: 1.5rem; 
      line-height: 1;
      letter-spacing: -2px;
      background: linear-gradient(to bottom right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .info-side p { color: var(--text-dim); margin-bottom: 3rem; font-size: 1.1rem; line-height: 1.6; }

    .contact-method { margin-bottom: 2rem; padding-left: 1rem; border-left: 2px solid var(--border-glass); }
    .method-label { color: var(--accent); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
    .method-value { font-size: 1.2rem; margin-top: 6px; font-weight: 500; color: #fff; }

    /* FORM STYLING */
    .form-side form { display: flex; flex-direction: column; gap: 1.5rem; }
    .input-box { display: flex; flex-direction: column; gap: 10px; }
    .input-box label { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    
    input, textarea {
      background: var(--input-bg);
      border: 1px solid var(--border-glass);
      padding: 1.2rem;
      border-radius: 16px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    input:focus, textarea:focus { 
      border-color: var(--accent); 
      background: rgba(56, 189, 248, 0.08); 
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
    }

    .submit-btn {
      background: var(--accent);
      color: var(--bg-deep);
      padding: 1.2rem;
      border: none;
      border-radius: 16px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.4s;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .submit-btn:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 15px 30px rgba(56, 189, 248, 0.3);
      filter: brightness(1.1);
    }

    /* --- ANIMATIONS --- */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1024px) {
      .contact-wrapper { grid-template-columns: 1fr; padding: 3rem; gap: 3rem; }
      .sidebar { width: 85px; padding: 1.5rem 0.5rem; }
      .nav-label, .nav-link span { display: none; }
      .main-content { margin-left: 85px; padding: 1.5rem; }
      h1 { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

  <aside id="sidebar-container" class="sidebar"></aside>

  <main class="main-content">
    <div class="contact-wrapper">
      
      <div class="info-side">
        <span style="color: var(--accent); font-weight: 800; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px;">PhD Inquiry Portal</span>
        <h1>Get in <br> Touch.</h1>
        <p>Connect with our architectural research team for high-level technical consultations and ecosystem support.</p>
        
        <div class="contact-method">
          <div class="method-label">Direct Communication</div>
          <div class="method-value">support@fuadsoft.io</div>
        </div>

        <div class="contact-method">
          <div class="method-label">Global Research Hub</div>
          <div class="method-value">Innovation Way, Tech District</div>
        </div>
      </div>

      <div class="form-side">
        <form id="contactForm">
          <div class="input-box">
            <label>Professional Name</label>
            <input type="text" placeholder="e.g. Dr. Fuad Mohamed" required>
          </div>
          <div class="input-box">
            <label>Encrypted Email</label>
            <input type="email" placeholder="your@domain.com" required>
          </div>
          <div class="input-box">
            <label>Inquiry Details</label>
            <textarea rows="5" placeholder="Describe your technical challenge..."></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Discovery Request</button>
        </form>
      </div>

    </div>
  </main>

  <script src="sidebar.js"></script>

</body>
</html>
