<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuadTech | Research-Grade Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; scroll-behavior: smooth; }
        
        /* PhD Level Animation: Smooth Reveal */
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Component Styling */
        .course-card { 
            background: white; border-radius: 2.5rem; padding: 2.5rem; 
            border: 1px solid #f1f5f9; transition: all 0.5s ease;
            display: flex; flex-direction: column; height: 100%;
        }
        .course-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.05);
            border-color: var(--primary);
        }

        .progress-bar { height: 4px; border-radius: 99px; background: #f8fafc; overflow: hidden; }
        .progress-fill { height: 100%; width: 0; transition: width 2s cubic-bezier(0.2, 1, 0.3, 1); }
        .active .progress-fill { width: var(--target-width); }
    </style>
</head>
<body class="pt-32 px-6 pb-40">

    <div class="max-w-7xl mx-auto">
        <header class="mb-24 text-center reveal" id="header">
            <h1 class="text-6xl font-[900] tracking-tighter mb-6">Academic <span class="text-blue-600 italic">Matrix.</span></h1>
            <div class="flex items-center justify-center gap-4">
                <span class="h-[1px] w-12 bg-slate-200"></span>
                <p class="text-slate-400 font-black uppercase tracking-[0.4em] text-[10px]">20 Global Research Domains</p>
                <span class="h-[1px] w-12 bg-slate-200"></span>
            </div>
        </header>

        <div id="dynamic-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </div>

    <script>
        // 1. THE DATA LAYER (PhD Level Centralized Truth)
        const MASTERY_DATA = [
            { title: "Java Spring Boot", cat: "Software", desc: "Enterprise-grade backend & JDBC.", level: "Expert", val: 95, color: "#2563eb" },
            { title: "GIS & Spatial SQL", cat: "Spatial", desc: "Analyzing raster data & Remote Sensing.", level: "Advanced", val: 88, color: "#f97316" },
            { title: "Machine Learning", cat: "Intelligence", desc: "Neural networks & AI modeling.", level: "Exploring", val: 55, color: "#7c3aed" },
            { title: "Node.js Ecosystem", cat: "Web", desc: "Asynchronous backend architecture.", level: "Advanced", val: 82, color: "#0ea5e9" },
            { title: "Android (Kotlin)", cat: "Mobile", desc: "Scalable mobile application development.", level: "Expert", val: 90, color: "#10b981" },
            { title: "Database Systems", cat: "Data", desc: "MySQL optimization & indexing.", level: "Advanced", val: 85, color: "#64748b" },
            { title: "UI/UX Architecture", cat: "Design", desc: "Component-based design systems.", level: "Expert", val: 96, color: "#ec4899" },
            { title: "Python for Data", cat: "Intelligence", desc: "Scripting and automated analysis.", level: "Intermediate", val: 70, color: "#eab308" }
            // Add remaining courses here...
        ];

        // 2. THE DYNAMIC COMPONENT ENGINE
        const renderMatrix = () => {
            const grid = document.getElementById('dynamic-grid');
            
            grid.innerHTML = MASTERY_DATA.map((course, index) => `
                <div class="reveal course-card shadow-sm" style="transition-delay: ${index * 100}ms">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest" 
                              style="background: ${course.color}15; color: ${course.color}">
                            ${course.cat}
                        </span>
                    </div>
                    <h3 class="text-xl font-[800] tracking-tight mb-2">${course.title}</h3>
                    <p class="text-slate-400 text-[11px] leading-relaxed mb-8">${course.desc}</p>
                    
                    <div class="mt-auto">
                        <div class="progress-bar mb-3">
                            <div class="progress-fill" style="background: ${course.color}; --target-width: ${course.val}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-black uppercase italic tracking-tighter">
                            <span style="color: ${course.color}">${course.level}</span>
                            <span class="text-slate-300">${course.val}%</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // Trigger Animation
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            }, 100);
        };

        // Initialize Engine
        document.addEventListener('DOMContentLoaded', renderMatrix);
    </script>
</body>
</html>
