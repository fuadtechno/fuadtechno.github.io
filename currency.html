<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter | Fuadsoft FinTech</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #38bdf8;
      --bg-deep: #020617;
      --sidebar-bg: #0f172a;
      --card-glass: rgba(30, 41, 59, 0.4);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-dim: #94a3b8;
      --input-bg: rgba(15, 23, 42, 0.8);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      background-image: radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05), transparent 40%);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-glass);
      position: fixed;
      height: 100vh;
      padding: 1.5rem;
      z-index: 1000;
    }

    /* --- MAIN CONTENT --- */
    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .converter-card {
      max-width: 500px;
      width: 100%;
      background: var(--card-glass);
      border: 1px solid var(--border-glass);
      padding: 3rem;
      border-radius: 35px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; margin-bottom: 0.5rem; text-align: center; }
    .subtitle { color: var(--text-dim); text-align: center; margin-bottom: 2.5rem; font-size: 0.9rem; }

    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }

    input, select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-glass);
      padding: 1.2rem;
      border-radius: 15px;
      color: white;
      font-size: 1.1rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus, select:focus { border-color: var(--accent); }

    .swap-btn {
      display: block;
      margin: 1rem auto;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid var(--border-glass);
      color: var(--accent);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.3s;
    }

    .swap-btn:hover { transform: rotate(180deg); background: var(--accent); color: var(--bg-deep); }

    .result-area {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(56, 189, 248, 0.05);
      border-radius: 15px;
      text-align: center;
      border: 1px dashed var(--border-glass);
    }

    .result-val { font-size: 1.8rem; font-weight: 800; color: var(--accent); font-family: 'Outfit'; }

    @media (max-width: 900px) {
      .sidebar { width: 70px; padding: 1rem 0.5rem; }
      .main-content { margin-left: 70px; padding: 2rem; }
    }
  </style>
</head>
<body>

  <aside id="sidebar-container" class="sidebar"></aside>

  <main class="main-content">
    <div class="converter-card">
      <h1>Currency Converter</h1>
      <p class="subtitle">Global exchange rates updated in real-time.</p>

      <div class="input-group">
        <label>Amount</label>
        <input type="number" value="1.00">
      </div>

      <div class="input-group">
        <label>From</label>
        <select>
          <option>USD - US Dollar</option>
          <option>ETB - Ethiopian Birr</option>
          <option>EUR - Euro</option>
        </select>
      </div>

      <button class="swap-btn">⇅</button>

      <div class="input-group">
        <label>To</label>
        <select>
          <option>ETB - Ethiopian Birr</option>
          <option>USD - US Dollar</option>
          <option>EUR - Euro</option>
        </select>
      </div>

      <div class="result-area">
        <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 5px;">Converted Amount</p>
        <div class="result-val">124.50 ETB</div>
      </div>
    </div>
  </main>

  <script src="sidebar.js"></script>

</body>
</html>
