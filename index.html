<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuad Techno | Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background-color: #161b22;
            padding: 50px;
            border-radius: 15px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #58a6ff; font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #8b949e; }
        .skills { margin-top: 20px; }
        .badge {
            background-color: #238636;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 5px;
            display: inline-block;
        }
        .btn {
            display: inline-block;
            background-color: #21262d;
            color: #58a6ff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid #30363d;
            margin-top: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #58a6ff;
            color: white;
            border-color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fuad Aliyi Mume</h1>
        <p>Software Developer | IT Student at Dire Dawa University</p>
        <div class="skills">
            <span class="badge">Java</span>
            <span class="badge">PHP</span>
            <span class="badge">Kotlin</span>
            <span class="badge">Full-Stack Web</span>
        </div>
        <p>Baga gara portfolio koo nagaatti dhuftan!</p>
        <a href="https://github.com/fuadtechno" class="btn">Projektoota Koo Ilaali</a>
    </div>
</body>
</html>
