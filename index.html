<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuadWeb | Advanced Learning Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-dark: #0f172a; --accent-blue: #3b82f6; }
        .glass-effect { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .hero-gradient { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-blue-200">

    <nav class="fixed w-full z-50 glass-effect border-b border-slate-800 bg-slate-900/90 text-white px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter italic">FUAD<span class="text-blue-500">WEB</span></div>
        <div class="hidden md:flex space-x-8 font-medium">
            <a href="index.html" class="hover:text-blue-400 transition">Home</a>
            <a href="course.html" class="hover:text-blue-400 transition">Academy</a>
            <a href="about.html" class="hover:text-blue-400 transition">About</a>
        </div>
        <button class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
    </nav>

    <header class="hero-gradient min-h-screen flex items-center pt-20 px-6">
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-6">
                <span class="text-blue-400 font-mono tracking-widest uppercase text-sm">Next-Gen Tech Education</span>
                <h1 class="text-5xl md:text-7xl font-bold text-white leading-tight">Empowering Global <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Innovators.</span></h1>
                <p class="text-slate-400 text-lg md:text-xl max-w-lg">Advanced curriculum bridging the gap between academic theory and industry-grade full-stack engineering.</p>
                <div class="flex flex-wrap gap-4">
                    <a href="course.html" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all">Explore Academy</a>
                    <a href="#vision" class="border border-slate-700 text-white px-8 py-4 rounded-xl font-bold hover:bg-slate-800 transition">Our Vision</a>
                </div>
            </div>
            <div class="hidden md:block relative">
                <div class="absolute -inset-4 bg-blue-500/20 blur-3xl rounded-full"></div>
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80" alt="Coding" class="relative rounded-2xl border border-slate-700 shadow-2xl">
            </div>
        </div>
    </header>
</body>
</html>
