<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuadTech | Smart Education</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="fixed w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">Fuad<span class="text-gray-700">Tech</span></div>
            <ul class="hidden md:flex space-x-8 font-medium">
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#courses" class="nav-link">Courses</a></li>
                <li><a href="#videos" class="nav-link">Videos</a></li>
                <li><a href="#news" class="nav-link">News</a></li>
            </ul>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">Login</button>
        </nav>
    </header>

    <section id="home" class="h-screen flex items-center justify-center bg-blue-50">
        <div class="text-center">
            <h1 class="text-5xl font-black mb-4">Empowering IT Students</h1>
            <p class="text-xl text-gray-600">Dynamic learning for the next generation of developers.</p>
        </div>
    </section>

    <section id="courses" class="py-20 container mx-auto px-6">
        <h2 class="text-3xl font-bold mb-8">Available Courses</h2>
        <div id="course-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </section>

    <section id="videos" class="py-20 bg-gray-900 text-white">
        <div class="container mx-auto px-6">
            <h2 class="text-3xl font-bold mb-8">Latest Lessons</h2>
            <div id="video-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                </div>
        </div>
    </section>

    <section id="news" class="py-20 container mx-auto px-6">
        <h2 class="text-3xl font-bold mb-8">Tech News</h2>
        <div id="news-container" class="space-y-4">
            </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
