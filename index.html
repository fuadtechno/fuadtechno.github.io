<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuadSoft | Dynamic Footer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

<div class="flex-grow"></div> <!-- Main content placeholder -->

<!-- Footer -->
<footer class="bg-gray-900 text-gray-300 py-12">
  <div id="footer-sections" class="max-w-7xl mx-auto px-4 grid grid-cols-2 md:grid-cols-6 gap-8"></div>

  <!-- Bottom -->
  <div class="mt-12 border-t border-gray-700 pt-6 flex flex-col md:flex-row items-center justify-between px-4 max-w-7xl mx-auto space-y-4 md:space-y-0">
    <!-- Logo & Copyright -->
    <div class="flex items-center space-x-2">
      <img src="logo.png" alt="FuadSoft Logo" class="h-6">
      <span class="text-gray-400">© 2026 FuadSoft</span>
    </div>

    <!-- Social & Contact -->
    <div id="footer-social" class="flex items-center space-x-4"></div>

    <!-- Language & Currency -->
    <div class="flex items-center space-x-4">
      <!-- Language Dropdown -->
      <div class="relative">
        <select id="language-select" class="bg-gray-800 text-white px-3 py-1 rounded focus:outline-none">
        </select>
      </div>

      <!-- Currency Dropdown -->
      <div class="relative">
        <select id="currency-select" class="bg-gray-800 text-white px-3 py-1 rounded focus:outline-none">
        </select>
      </div>
    </div>
  </div>
</footer>

<script>
  // Footer data
  const footerData = {
    sections: [
      {
        title: "About FuadSoft",
        links: [
          { text: "About Us", url: "#" },
          { text: "Careers", url: "#" },
          { text: "Contact Us", url: "#" },
          { text: "Blog", url: "#" },
          { text: "Legal", url: "#" }
        ]
      },
      {
        title: "Support",
        links: [
          { text: "Help Center", url: "#" },
          { text: "Report Issue", url: "#" },
          { text: "Resources", url: "#" }
        ]
      },
      {
        title: "Resources",
        links: [
          { text: "Web Tools", url: "#" },
          { text: "API Docs", url: "#" },
          { text: "Business Name Generator", url: "#" }
        ]
      },
      {
        title: "Partner Programs",
        links: [
          { text: "Affiliates", url: "#" },
          { text: "Resellers", url: "#" },
          { text: "FuadSoft Pro", url: "#" }
        ]
      },
      {
        title: "Account",
        links: [
          { text: "Sign In", url: "#" },
          { text: "Create Account", url: "#" },
          { text: "Billing", url: "#" }
        ]
      },
      {
        title: "Products",
        links: [
          { text: "Domains", url: "#" },
          { text: "Hosting", url: "#" },
          { text: "Email Services", url: "#" },
          { text: "Logo Generator", url: "#" }
        ]
      }
    ],
    social: [
      { icon: "fab fa-facebook-f", url: "#" },
      { icon: "fab fa-instagram", url: "#" },
      { icon: "fab fa-twitter", url: "#" },
      { icon: "contact", text: "Contact Us", url: "#" }
    ],
    languages: [
      { code: "en", name: "English" },
      { code: "es", name: "Español" },
      { code: "fr", name: "Français" },
      { code: "de", name: "Deutsch" }
    ],
    currencies: [
      { code: "USD", symbol: "$" },
      { code: "EUR", symbol: "€" },
      { code: "GBP", symbol: "£" },
      { code: "JPY", symbol: "¥" }
    ]
  };

  // Generate footer sections
  const footerSections = document.getElementById("footer-sections");
  footerData.sections.forEach(section => {
    const sectionDiv = document.createElement("div");
    const title = document.createElement("h3");
    title.textContent = section.title;
    title.className = "text-white font-semibold mb-4";
    sectionDiv.appendChild(title);

    const ul = document.createElement("ul");
    ul.className = "space-y-2 text-sm";
    section.links.forEach(link => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.textContent = link.text;
      a.href = link.url;
      a.className = "hover:text-white";
      li.appendChild(a);
      ul.appendChild(li);
    });

    sectionDiv.appendChild(ul);
    footerSections.appendChild(sectionDiv);
  });

  // Generate social icons
  const footerSocial = document.getElementById("footer-social");
  footerData.social.forEach(s => {
    if(s.icon === "contact") {
      const btn = document.createElement("button");
      btn.className = "bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded flex items-center space-x-2";
      btn.textContent = s.text;
      btn.onclick = () => window.location.href = s.url;
      footerSocial.appendChild(btn);
    } else {
      const a = document.createElement("a");
      a.href = s.url;
      a.className = "hover:text-white";
      a.innerHTML = `<i class="${s.icon}"></i>`;
      footerSocial.appendChild(a);
    }
  });

  // Generate language dropdown
  const langSelect = document.getElementById("language-select");
  footerData.languages.forEach(l => {
    const option = document.createElement("option");
    option.value = l.code;
    option.textContent = l.name;
    langSelect.appendChild(option);
  });

  langSelect.addEventListener("change", (e) => {
    alert("Language changed to: " + e.target.value);
    // Here you can implement actual language change logic
  });

  // Generate currency dropdown
  const currencySelect = document.getElementById("currency-select");
  footerData.currencies.forEach(c => {
    const option = document.createElement("option");
    option.value = c.code;
    option.textContent = `${c.code} (${c.symbol})`;
    currencySelect.appendChild(option);
  });

  currencySelect.addEventListener("change", (e) => {
    alert("Currency changed to: " + e.target.value);
    // Here you can implement actual currency change logic
  });
</script>

</body>
</html>
