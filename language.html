<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Settings | Fuadsoft Localization</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.15);
      --bg-deep: #020617;
      --sidebar-bg: #0f172a;
      --card-glass: rgba(15, 23, 42, 0.6);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-dim: #94a3b8;
    }

    /* --- RESET & GLOBAL --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.05), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05), transparent 40%);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-glass);
      position: fixed;
      height: 100vh;
      padding: 2rem 1.5rem;
      z-index: 1000;
      backdrop-filter: blur(15px);
    }

    /* --- MAIN CONTENT --- */
    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 5rem 4rem;
      max-width: 1200px;
      animation: fadeIn 0.8s ease-out;
    }

    .settings-header { margin-bottom: 4rem; }
    
    .settings-header h1 { 
      font-family: 'Outfit', sans-serif; 
      font-size: 2.8rem; 
      letter-spacing: -1px;
      background: linear-gradient(to right, #fff, var(--text-dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings-header p { 
      color: var(--text-dim); 
      font-size: 1.1rem; 
      margin-top: 10px;
    }

    /* --- LANGUAGE GRID --- */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .lang-option {
      background: var(--card-glass);
      border: 1px solid var(--border-glass);
      padding: 2rem;
      border-radius: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
    }

    .lang-option:hover {
      border-color: var(--accent);
      transform: translateY(-8px);
      background: rgba(56, 189, 248, 0.05);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    /* Selection Indicator */
    .lang-option.active {
      border-color: var(--accent);
      background: linear-gradient(145deg, rgba(56, 189, 248, 0.15), rgba(15, 23, 42, 0.6));
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .lang-option.active::after {
      content: "✓";
      position: absolute;
      top: 15px; right: 20px;
      color: var(--accent);
      font-weight: 900;
      font-size: 1.2rem;
    }

    .flag-icon {
      font-size: 1.8rem;
      background: rgba(255,255,255,0.03);
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      border: 1px solid var(--border-glass);
    }

    .lang-info h4 { font-family: 'Outfit', sans-serif; font-size: 1.25rem; margin-bottom: 4px; }
    .lang-info span { 
      font-size: 0.7rem; 
      color: var(--accent); 
      text-transform: uppercase; 
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* --- SAVE SECTION --- */
    .save-section {
      margin-top: 5rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border-glass);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-msg { color: var(--text-dim); font-size: 0.9rem; font-style: italic; }

    .btn-save {
      padding: 1.2rem 3rem;
      background: var(--accent);
      color: var(--bg-deep);
      border: none;
      border-radius: 18px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.4s;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
    }

    .btn-save:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 40px rgba(56, 189, 248, 0.5);
      filter: brightness(1.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .sidebar { width: 85px; padding: 1.5rem 0.5rem; }
      .main-content { margin-left: 85px; padding: 2rem; }
    }
  </style>
</head>
<body>

  <aside id="sidebar-container" class="sidebar"></aside>

  <main class="main-content">
    <div class="settings-header">
      <h1>Language Engine</h1>
      <p>Synchronizing Fuadsoft core modules with regional linguistic protocols.</p>
    </div>

    <div class="lang-grid">
      <div class="lang-option">
        <div class="flag-icon">🌳</div>
        <div class="lang-info">
          <h4>Afaan Oromoo</h4>
          <span>Regional / Ethiopia</span>
        </div>
      </div>

      <div class="lang-option active">
        <div class="flag-icon">🇺🇸</div>
        <div class="lang-info">
          <h4>English (US)</h4>
          <span>Global / Default</span>
        </div>
      </div>

      <div class="lang-option">
        <div class="flag-icon">🇪🇹</div>
        <div class="lang-info">
          <h4>Amharic</h4>
          <span>National / Ethiopia</span>
        </div>
      </div>

      <div class="lang-option">
        <div class="flag-icon">🇦🇪</div>
        <div class="lang-info">
          <h4>Arabic</h4>
          <span>Middle East / MENA</span>
        </div>
      </div>
    </div>

    <div class="save-section">
      <div class="status-msg">Translation sync: 100% complete</div>
      <button class="btn-save">Apply Localization</button>
    </div>
  </main>

  <script src="sidebar.js"></script>

</body>
</html>
