<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuadTech | Global Tech Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #2563eb; --accent: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; scroll-behavior: smooth; }
        
        /* PhD Level Animation: Component Stagger */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.2, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .bento-news { 
            background: white; border-radius: 3rem; padding: 3rem; 
            border: 1px solid #f1f5f9; transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; flex-direction: column; height: 100%;
        }
        .bento-news:hover { 
            transform: translateY(-12px); 
            border-color: #dbeafe; 
            box-shadow: 0 50px 100px -20px rgba(37, 99, 235, 0.08); 
        }

        /* RSS Container PhD Styling */
        .rss-frame-container {
            background: white; border-radius: 4rem; padding: 1rem;
            box-shadow: 0 40px 100px -30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
        }
    </style>
</head>
<body class="pt-32 px-6 pb-40">

    <header class="max-w-7xl mx-auto mb-24 text-center reveal" id="header">
        <h1 class="text-7xl font-[900] tracking-tighter mb-8 italic">World <span class="text-blue-600">Reports.</span></h1>
        <p class="text-slate-400 max-w-xl mx-auto text-lg font-medium leading-relaxed">
            Real-time tech intelligence and academic breakthroughs from the heart of <span class="text-black font-bold">Dire Dawa University</span>.
        </p>
    </header>

    <main class="max-w-7xl mx-auto space-y-32">
        <section class="rss-frame-container reveal">
            <iframe width="100%" height="700" src="https://rss.app/embed/v1/wall/t5XW6Z8N8Y8Z8X8Z" frameborder="0" class="rounded-[3.5rem]"></iframe>
        </section>

        <section>
            <div class="flex justify-between items-center mb-20 reveal">
                <h2 class="text-5xl font-[900] italic tracking-tighter">Campus Spotlight</h2>
                <div class="h-[1px] flex-grow mx-12 bg-slate-100 hidden md:block"></div>
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] text-blue-600">Research Nodes</p>
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-300">Updated April 2026</p>
                </div>
            </div>

            <div id="spotlight-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                </div>
        </section>
    </main>

    <script>
        // 1. DATA REPOSITORY (The "Source of Truth")
        const CAMPUS_DATA = [
            {
                id: "26",
                tag: "Project Expo • DDU",
                title: "Smart Attendance Architecture",
                body: "Deploying an SOA-based dashboard for real-time student tracking. A deep dive into JDBC and MySQL integration for enterprise scalability.",
                linkText: "Read Documentation",
                icon: "cpu",
                color: "blue"
            },
            {
                id: "GIS",
                tag: "Research • GIS",
                title: "Spatial Data Analysis",
                body: "Leveraging Remote Sensing to predict urban growth patterns in Eastern Ethiopia. New raster analysis results utilizing QGIS and Python.",
                linkText: "Explore Data",
                icon: "map",
                color: "emerald"
            }
        ];

        // 2. DYNAMIC COMPONENT ENGINE
        const injectSpotlight = () => {
            const grid = document.getElementById('spotlight-grid');
            
            grid.innerHTML = CAMPUS_DATA.map((item, index) => `
                <div class="bento-news reveal" style="transition-delay: ${index * 150}ms">
                    <div class="flex items-center gap-6 mb-8">
                        <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-white">
                            <i data-lucide="${item.icon}" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">${item.tag}</p>
                            <h4 class="text-xs font-bold text-${item.color}-600 uppercase italic">Research Node ${item.id}</h4>
                        </div>
                    </div>
                    <h3 class="text-3xl font-[800] mb-6 tracking-tight leading-tight">${item.title}</h3>
                    <p class="text-slate-500 leading-relaxed mb-10 font-medium">${item.body}</p>
                    <div class="mt-auto">
                        <a href="#" class="inline-flex items-center gap-3 text-black font-[900] text-[10px] uppercase tracking-[0.3em] hover:gap-6 transition-all group">
                            ${item.linkText} 
                            <span class="text-blue-600 transition-transform group-hover:scale-150">→</span>
                        </a>
                    </div>
                </div>
            `).join('');

            // Initialize Icons and Reveal
            lucide.createIcons();
            
            // Trigger animation frame
            requestAnimationFrame(() => {
                document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            });
        };

        document.addEventListener('DOMContentLoaded', injectSpotlight);
    </script>
</body>
</html>
