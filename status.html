<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Status | Fuadsoft PhD Core</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #38bdf8;
      --bg-deep: #020617;
      --sidebar-bg: #0f172a;
      --card-glass: rgba(30, 41, 59, 0.4);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-dim: #94a3b8;
      --success: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-glass);
      position: fixed;
      height: 100vh;
      padding: 1.5rem;
      z-index: 1000;
    }

    /* --- STATUS CONTENT --- */
    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 4rem;
    }

    .status-header {
      margin-bottom: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
    }

    .overall-badge {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pulse {
      width: 10px;
      height: 10px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
      animation: pulse-animation 2s infinite;
    }

    @keyframes pulse-animation {
      0% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0); }
    }

    .service-card {
      background: var(--card-glass);
      border: 1px solid var(--border-glass);
      padding: 2rem;
      border-radius: 25px;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .service-info h3 { font-family: 'Outfit', sans-serif; margin-bottom: 5px; }
    .service-info p { color: var(--text-dim); font-size: 0.85rem; }

    .uptime-graph {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .bar {
      width: 4px;
      height: 30px;
      background: var(--success);
      border-radius: 2px;
      opacity: 0.6;
    }

    .nav-link.active {
      background: rgba(56, 189, 248, 0.1) !important;
      border-left: 4px solid var(--accent) !important;
      color: var(--accent) !important;
    }

    @media (max-width: 900px) {
      .sidebar { width: 70px; }
      .main-content { margin-left: 70px; padding: 2rem; }
    }
  </style>
</head>
<body>

  <aside id="sidebar-container" class="sidebar"></aside>

  <main class="main-content">
    <div class="status-header">
      <div>
        <h1>System Status</h1>
        <p style="color: var(--text-dim);">Live monitoring of Fuadsoft infrastructure.</p>
      </div>
      <div class="overall-badge">
        <div class="pulse"></div> All Systems Operational
      </div>
    </div>

    <div class="service-card">
      <div class="service-info">
        <h3>Core API</h3>
        <p>Operational • 99.99% Uptime</p>
      </div>
      <div class="uptime-graph">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>

    <div class="service-card">
      <div class="service-info">
        <h3>PhD Data Nexus</h3>
        <p>Operational • Latency: 24ms</p>
      </div>
      <div class="uptime-graph">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>

    <div class="service-card">
      <div class="service-info">
        <h3>SDK Repository</h3>
        <p>Operational • Global CDN</p>
      </div>
      <div class="uptime-graph">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>

  </main>

  <script src="sidebar.js"></script>

</body>
</html>
