<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | Fuadsoft Insights</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #38bdf8;
      --bg-deep: #020617;
      --sidebar-bg: #0f172a;
      --card-glass: rgba(30, 41, 59, 0.4);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-dim: #94a3b8;
      --success: #10b981;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      background-image: radial-gradient(at 0% 0%, #0f172a 0, transparent 50%);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
    }

    /* --- SIDEBAR BASE STYLES --- */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-glass);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      padding: 1.5rem;
      z-index: 1000;
    }

    /* Styles for sidebar.js injected content */
    .logo-area { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; padding-bottom: 2rem; color: var(--accent); }
    .nav-group { margin-bottom: 1.5rem; }
    .nav-label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; display: block; }
    .nav-link { display: flex; align-items: center; padding: 0.7rem 1rem; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; border-radius: 10px; transition: 0.3s; }
    .nav-link:hover { background: rgba(56, 189, 248, 0.1); color: var(--accent); }
    .nav-link.active { background: var(--accent); color: var(--bg-deep); font-weight: 600; }

    /* --- MAIN ANALYTICS CONTENT --- */
    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 3rem;
    }

    .header-area {
      margin-bottom: 2.5rem;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--card-glass);
      border: 1px solid var(--border-glass);
      padding: 1.5rem;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .stat-label { color: var(--text-dim); font-size: 0.85rem; font-weight: 500; }
    .stat-value { font-size: 1.8rem; font-weight: 800; margin: 0.5rem 0; font-family: 'Outfit'; }
    .stat-trend { color: var(--success); font-size: 0.8rem; font-weight: 600; }

    .chart-placeholder {
      background: var(--card-glass);
      border: 1px solid var(--border-glass);
      height: 350px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      border-style: dashed;
    }

    @media (max-width: 900px) {
      .sidebar { width: 70px; padding: 1rem 0.5rem; }
      .nav-label, .nav-link span { display: none; }
      .main-content { margin-left: 70px; padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <aside id="sidebar-container" class="sidebar"></aside>

  <main class="main-content">
    <div class="header-area">
      <h1>Analytics Dashboard</h1>
      <p style="color: var(--text-dim);">Real-time performance metrics and data insights.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Traffic</div>
        <div class="stat-value">128.4K</div>
        <div class="stat-trend">↑ 12.5% this month</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Users</div>
        <div class="stat-value">4,290</div>
        <div class="stat-trend">↑ 5.2%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg. Session</div>
        <div class="stat-value">04:22</div>
        <div class="stat-trend" style="color: var(--accent);">Stable</div>
      </div>
    </div>

    <div class="chart-placeholder">
      <div style="text-align: center;">
        <p style="font-size: 1.5rem; font-weight: 600; margin-bottom: 10px;">Data Visualization Area</p>
        <p style="font-size: 0.9rem;">PhD Level Charting Engine Integration Ready</p>
      </div>
    </div>

  </main>

  <script src="sidebar.js"></script>

</body>
</html>
